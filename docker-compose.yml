version: '3.8'

services:
  # Flask Backend with AI Features
  flask-backend:
    build:
      context: .
      target: production
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///concentratrack.db}
    volumes:
      - ./data:/app/data
    networks:
      - concentratrack-network
    restart: unless-stopped

  # Node.js Backend (Alternative)
  node-backend:
    build:
      context: .
      target: node-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/data
    networks:
      - concentratrack-network
    restart: unless-stopped
    profiles:
      - node

  # PostgreSQL Database (Optional)
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=concentratrack
      - POSTGRES_USER=${POSTGRES_USER:-concentratrack}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - concentratrack-network
    restart: unless-stopped
    profiles:
      - postgres

  # Redis for Caching (Optional)
  redis:
    image: redis:7-alpine
    networks:
      - concentratrack-network
    restart: unless-stopped
    profiles:
      - redis

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - flask-backend
    networks:
      - concentratrack-network
    restart: unless-stopped
    profiles:
      - nginx

volumes:
  postgres_data:

networks:
  concentratrack-network:
    driver: bridge